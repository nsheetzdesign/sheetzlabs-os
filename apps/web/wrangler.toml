name = "sheetzlabs-web"
main = "./workers/app.ts"
compatibility_date = "2025-04-04"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
API_URL = "https://api.sheetzlabs.com"
# Single-tenant allowlist (Prompt 54A Part 0) — must match the API worker. Web loaders
# hit Supabase directly with the service key, so the API's check alone is insufficient;
# non-allowlisted sessions are signed out in requireAuth.
ALLOWED_USER_EMAILS = "nick@sheetzlabs.com,e2e@sheetzlabs.com"

# Custom domains — Cloudflare provisions DNS + TLS automatically
[[routes]]
pattern = "sheetzlabs.com"
custom_domain = true

[[routes]]
pattern = "www.sheetzlabs.com"
custom_domain = true

[[routes]]
pattern = "app.sheetzlabs.com"
custom_domain = true

# SUPABASE_URL and SUPABASE_ANON_KEY are set via `wrangler secret put`
