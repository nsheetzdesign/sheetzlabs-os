name = "sheetzlabs-web"
main = "./workers/app.ts"
compatibility_date = "2025-04-04"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
API_URL = "https://api.sheetzlabs.com"

# Custom domains — Cloudflare provisions DNS + TLS automatically
[[routes]]
pattern = "sheetzlabs.com"
custom_domain = true

[[routes]]
pattern = "www.sheetzlabs.com"
custom_domain = true

[[routes]]
pattern = "app.sheetzlabs.com"
custom_domain = true

# SUPABASE_URL and SUPABASE_ANON_KEY are set via `wrangler secret put`
