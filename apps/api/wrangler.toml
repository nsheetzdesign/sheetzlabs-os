name = "sheetzlabs-api"
main = "src/index.ts"
compatibility_date = "2025-04-04"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# Comma-separated CORS allowlist. localhost/127.0.0.1 (any port) is always allowed.
ALLOWED_ORIGINS = "https://app.sheetzlabs.com"
# Public web app origin — used for OAuth callback redirects.
APP_URL = "https://app.sheetzlabs.com"

# Custom domain — Cloudflare provisions DNS + TLS automatically
[[routes]]
pattern = "api.sheetzlabs.com"
custom_domain = true

[triggers]
crons = [
  "* * * * *"  # Every minute — unsnooze emails, sync accounts, scheduled agents and content queue
]

# Per-IP rate limiting for public booking endpoints (BK-5).
# `ratelimit` is an unsafe binding; if unavailable on the current plan the booking
# router fails open (see checkRateLimit in routes/booking.ts) — noted in deploy summary.
[[unsafe.bindings]]
name = "BOOKING_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "BOOKING_SLOTS_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

# Secrets set via `wrangler secret put`:
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_ANON_KEY — used by the auth middleware to verify user JWTs
# CRON_SECRET — shared secret the cron presents (X-Internal-Secret) for internal self-calls
# STRIPE_PERSONAL_KEY
# STRIPE_PERSONAL_WEBHOOK_SECRET
# STRIPE_COLAB_KEY
# STRIPE_COLAB_WEBHOOK_SECRET
# N8N_API_KEY
# ANTHROPIC_API_KEY
# LINKEDIN_ACCESS_TOKEN
# LINKEDIN_PERSON_ID
# CLOUDFLARE_BILLING_TOKEN
# SERPER_API_KEY  (or BRAVE_API_KEY) — web search for idea evaluator agent
# GOOGLE_CLIENT_ID — Gmail OAuth
# GOOGLE_CLIENT_SECRET — Gmail OAuth
# API_URL — public API base URL (https://api.sheetzlabs.com)
