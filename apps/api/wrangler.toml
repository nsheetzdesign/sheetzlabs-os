name = "sheetzlabs-api"
main = "src/index.ts"
compatibility_date = "2025-04-04"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Custom domain — Cloudflare provisions DNS + TLS automatically
[[routes]]
pattern = "api.sheetzlabs.com"
custom_domain = true

# Secrets set via `wrangler secret put`:
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# STRIPE_PERSONAL_KEY
# STRIPE_PERSONAL_WEBHOOK_SECRET
# STRIPE_COLAB_KEY
# STRIPE_COLAB_WEBHOOK_SECRET
# N8N_API_KEY
